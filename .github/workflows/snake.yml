name: Generate Snake

on:
  schedule:
    # Runs once daily at 00:45 UTC (08:45 Asia/Shanghai)
    - cron: '45 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    name: Generate contribution snake
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=2F80ED

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
